        const AlertCircle = ({ size = 24, className = '' }) => (

            )
        );

        const FileText = ({ size = 24, className = '' }) => (
            React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2',
                className: className,
                style: { display: 'inline-block' }
            },
                React.createElement('path', { d: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z' }),
                React.createElement('polyline', { points: '14 2 14 8 20 8' }),
                React.createElement('line', { x1: '12', y1: '13', x2: '12', y2: '17' }),
                React.createElement('line', { x1: '10', y1: '15', x2: '14', y2: '15' })
            )
        );

        const Upload = ({ size = 24, className = '' }) => (
            React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2',
                className: className,
                style: { display: 'inline-block' }
            },
                React.createElement('path', { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }),
                React.createElement('polyline', { points: '17 8 12 3 7 8' }),
                React.createElement('line', { x1: '12', y1: '3', x2: '12', y2: '15' })
            )
        );

        const Download = ({ size = 24, className = '' }) => (
            React.createElement('svg', {
                width: size,
                height: size,
                viewBox: '0 0 24 24',
                fill: 'none',
                stroke: 'currentColor',
                strokeWidth: '2',
                className: className,
                style: { display: 'inline-block' }
            },
                React.createElement('path', { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }),
                React.createElement('polyline', { points: '7 10 12 15 17 10' }),
                React.createElement('line', { x1: '12', y1: '15', x2: '12', y2: '3' })
            )
        );

        const ResourcePlanner = () => {
            const [engineers, setEngineers] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [showNewEngineer, setShowNewEngineer] = useState(false);
            const [showNewBooking, setShowNewBooking] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [newEngineer, setNewEngineer] = useState({ name: '', region: '' });
            const [newBooking, setNewBooking] = useState({
                engineerId: '',
                jobName: '',
                jobDescription: '',
                location: '',
                region: '',
                startDate: '',
                endDate: '',
                additionalDetails: '',
                documents: [],
            });
            const [selectedEngineer, setSelectedEngineer] = useState(null);
            const [lastSync, setLastSync] = useState(new Date());
            const [expandedBooking, setExpandedBooking] = useState(null);
            const fileInputRef = useRef(null);
            const syncIntervalRef = useRef(null);

            // Load data from localStorage
            const loadData = () => {
                try {
                    const engData = localStorage.getItem('engineers-v3');
                    const bookData = localStorage.getItem('bookings-v3');
                    
                    if (engData) setEngineers(JSON.parse(engData));
                    if (bookData) setBookings(JSON.parse(bookData));
                    setLastSync(new Date());
                } catch (error) {
                    console.log('Loading initial data');
                }
            };

            // Save data to localStorage
            const saveData = (newEngineers, newBookings) => {
                try {
                    localStorage.setItem('engineers-v3', JSON.stringify(newEngineers));
                    localStorage.setItem('bookings-v3', JSON.stringify(newBookings));
                    setLastSync(new Date());
                } catch (error) {
                    console.error('Save error:', error);
                    alert('Storage limit exceeded. Please clear some old data.');
                }
            };

            useEffect(() => {
                loadData();
                syncIntervalRef.current = setInterval(loadData, 2000);
                return () => clearInterval(syncIntervalRef.current);
            }, []);

            const handleAddEngineer = () => {
                if (!newEngineer.name.trim() || !newEngineer.region.trim()) {
                    alert('Please fill in both name and region');
                    return;
                }
                
                const id = Date.now().toString();
                const updated = [...engineers, { 
                    id, 
                    name: newEngineer.name, 
                    region: newEngineer.region 
                }];
                setEngineers(updated);
                saveData(updated, bookings);
                setNewEngineer({ name: '', region: '' });
                setShowNewEngineer(false);
            };

            const handleDeleteEngineer = (id) => {
                const updated = engineers.filter(e => e.id !== id);
                const updatedBookings = bookings.filter(b => b.engineerId !== id);
                setEngineers(updated);
                setBookings(updatedBookings);
                saveData(updated, updatedBookings);
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const document = {
                            id: Date.now().toString() + Math.random(),
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            data: event.target.result,
                            uploadedAt: new Date().toISOString(),
                        };
                        setNewBooking(prev => ({
                            ...prev,
                            documents: [...prev.documents, document]
                        }));
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = '';
            };

            const handleRemoveDocument = (docId) => {
                setNewBooking(prev => ({
                    ...prev,
                    documents: prev.documents.filter(d => d.id !== docId)
                }));
            };

            const handleAddBooking = () => {
                if (!newBooking.engineerId || !newBooking.jobName || !newBooking.location || !newBooking.region || !newBooking.startDate || !newBooking.endDate) {
                    alert('Please fill in all required fields');
                    return;
                }

                if (new Date(newBooking.startDate) > new Date(newBooking.endDate)) {
                    alert('Start date must be before end date');
                    return;
                }

                const id = Date.now().toString();
                const booking = {
                    id,
                    ...newBooking,
                    startDate: new Date(newBooking.startDate).toISOString(),
                    endDate: new Date(newBooking.endDate).toISOString(),
                };

                const updated = [...bookings, booking];
                setBookings(updated);
                saveData(engineers, updated);
                setNewBooking({
                    engineerId: '',
                    jobName: '',
                    jobDescription: '',
                    location: '',
                    region: '',
                    startDate: '',
                    endDate: '',
                    additionalDetails: '',
                    documents: [],
                });
                setShowNewBooking(false);
            };

            const handleDeleteBooking = (id) => {
                const updated = bookings.filter(b => b.id !== id);
                setBookings(updated);
                saveData(engineers, updated);
                setExpandedBooking(null);
            };

            const handleDownloadDocument = (doc) => {
                const link = document.createElement('a');
                link.href = doc.data;
                link.download = doc.name;
                link.click();
            };

            const getDaysInMonth = (date) => {
                return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (date) => {
                return new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            };

            const isBookingOnDate = (booking, date) => {
                const start = new Date(booking.startDate);
                const end = new Date(booking.endDate);
                const check = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                start.setHours(0, 0, 0, 0);
                end.setHours(23, 59, 59, 999);
                return check >= start && check <= end;
            };

            const getEngineer = (id) => {
                return engineers.find(e => e.id === id);
            };

            const formatFileSize = (bytes) => {
