<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Resource Planner</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3, .font-display {
            font-family: 'Syne', sans-serif;
        }

        svg {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useRef } = React;

        // Icon components (simple SVG implementations)
        const Plus = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const X = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const ChevronLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );

        const ChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        const Users = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const MapPin = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        );

        const Calendar = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const AlertCircle = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const FileText = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="12" y1="13" x2="12" y2="17"></line>
                <line x1="10" y1="15" x2="14" y2="15"></line>
            </svg>
        );

        const Upload = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const Download = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const ResourcePlanner = () => {
            const [engineers, setEngineers] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [showNewEngineer, setShowNewEngineer] = useState(false);
            const [showNewBooking, setShowNewBooking] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [newEngineer, setNewEngineer] = useState({ name: '', region: '' });
            const [newBooking, setNewBooking] = useState({
                engineerId: '',
                jobName: '',
                jobDescription: '',
                location: '',
                region: '',
                startDate: '',
                endDate: '',
                additionalDetails: '',
                documents: [],
            });
            const [selectedEngineer, setSelectedEngineer] = useState(null);
            const [lastSync, setLastSync] = useState(new Date());
            const [expandedBooking, setExpandedBooking] = useState(null);
            const fileInputRef = useRef(null);
            const syncIntervalRef = useRef(null);

            // Load data from localStorage
            const loadData = async () => {
                try {
                    const engData = localStorage.getItem('engineers-v2');
                    const bookData = localStorage.getItem('bookings-v2');
                    
                    if (engData) setEngineers(JSON.parse(engData));
                    if (bookData) setBookings(JSON.parse(bookData));
                    setLastSync(new Date());
                } catch (error) {
                    console.log('Loading initial data');
                }
            };

            // Save data to localStorage
            const saveData = async (newEngineers, newBookings) => {
                try {
                    localStorage.setItem('engineers-v2', JSON.stringify(newEngineers));
                    localStorage.setItem('bookings-v2', JSON.stringify(newBookings));
                    setLastSync(new Date());
                } catch (error) {
                    console.error('Save error:', error);
                    alert('Storage limit exceeded. Please clear some old data.');
                }
            };

            useEffect(() => {
                loadData();
                syncIntervalRef.current = setInterval(loadData, 2000);
                return () => clearInterval(syncIntervalRef.current);
            }, []);

            // Add engineer
            const handleAddEngineer = async () => {
                if (!newEngineer.name.trim() || !newEngineer.region.trim()) {
                    alert('Please fill in both name and region');
                    return;
                }
                
                const id = Date.now().toString();
                const updated = [...engineers, { 
                    id, 
                    name: newEngineer.name, 
                    region: newEngineer.region 
                }];
                setEngineers(updated);
                await saveData(updated, bookings);
                setNewEngineer({ name: '', region: '' });
                setShowNewEngineer(false);
            };

            // Delete engineer
            const handleDeleteEngineer = async (id) => {
                const updated = engineers.filter(e => e.id !== id);
                const updatedBookings = bookings.filter(b => b.engineerId !== id);
                setEngineers(updated);
                setBookings(updatedBookings);
                await saveData(updated, updatedBookings);
            };

            // Handle file upload
            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const document = {
                            id: Date.now().toString() + Math.random(),
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            data: event.target.result,
                            uploadedAt: new Date().toISOString(),
                        };
                        setNewBooking(prev => ({
                            ...prev,
                            documents: [...prev.documents, document]
                        }));
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = '';
            };

            // Remove document
            const handleRemoveDocument = (docId) => {
                setNewBooking(prev => ({
                    ...prev,
                    documents: prev.documents.filter(d => d.id !== docId)
                }));
            };

            // Add booking
            const handleAddBooking = async () => {
                if (!newBooking.engineerId || !newBooking.jobName || !newBooking.location || !newBooking.region || !newBooking.startDate || !newBooking.endDate) {
                    alert('Please fill in all required fields');
                    return;
                }

                if (new Date(newBooking.startDate) > new Date(newBooking.endDate)) {
                    alert('Start date must be before end date');
                    return;
                }

                const id = Date.now().toString();
                const booking = {
                    id,
                    ...newBooking,
                    startDate: new Date(newBooking.startDate).toISOString(),
                    endDate: new Date(newBooking.endDate).toISOString(),
                };

                const updated = [...bookings, booking];
                setBookings(updated);
                await saveData(engineers, updated);
                setNewBooking({
                    engineerId: '',
                    jobName: '',
                    jobDescription: '',
                    location: '',
                    region: '',
                    startDate: '',
                    endDate: '',
                    additionalDetails: '',
                    documents: [],
                });
                setShowNewBooking(false);
            };

            // Delete booking
            const handleDeleteBooking = async (id) => {
                const updated = bookings.filter(b => b.id !== id);
                setBookings(updated);
                await saveData(engineers, updated);
                setExpandedBooking(null);
            };

            // Download document
            const handleDownloadDocument = (doc) => {
                const link = document.createElement('a');
                link.href = doc.data;
                link.download = doc.name;
                link.click();
            };

            // Get days in month
            const getDaysInMonth = (date) => {
                return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (date) => {
                return new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            };

            const isBookingOnDate = (booking, date) => {
                const start = new Date(booking.startDate);
                const end = new Date(booking.endDate);
                const check = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                start.setHours(0, 0, 0, 0);
                end.setHours(23, 59, 59, 999);
                return check >= start && check <= end;
            };

            const getEngineer = (id) => {
                return engineers.find(e => e.id === id);
            };

            const formatFileSize = (bytes) => {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
            };

            const renderMonth = () => {
                const daysInMonth = getDaysInMonth(currentDate);
                const firstDay = getFirstDayOfMonth(currentDate);
                const days = [];

                for (let i = 0; i < firstDay; i++) {
                    days.push(React.createElement('div', { key: `empty-${i}`, className: 'h-24 bg-gray-50 border border-gray-200' }));
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                    const dayBookings = bookings.filter(b => isBookingOnDate(b, date));

                    days.push(
                        React.createElement('div', {
                            key: day,
                            className: 'h-24 border border-gray-200 p-2 bg-white hover:bg-gray-50 transition-colors overflow-hidden'
                        },
                            React.createElement('div', { className: 'text-sm font-semibold text-gray-700 mb-1' }, day),
                            React.createElement('div', { className: 'space-y-0.5 text-xs' },
                                dayBookings.map(booking => {
                                    const engineer = getEngineer(booking.engineerId);
                                    return React.createElement('div', {
                                        key: booking.id,
                                        onClick: () => setExpandedBooking(booking.id),
                                        className: 'bg-blue-100 text-blue-900 px-2 py-0.5 rounded truncate cursor-pointer hover:bg-blue-200 transition-colors font-medium',
                                        title: `${engineer?.name} - ${booking.jobName}`
                                    }, engineer?.name.split(' ')[0]);
                                })
                            )
                        )
                    );
                }

                return days;
            };

            const renderBookingsList = () => {
                const sortedBookings = [...bookings].sort((a, b) => 
                    new Date(a.startDate) - new Date(b.startDate)
                );

                return sortedBookings.map(booking => {
                    const start = new Date(booking.startDate);
                    const end = new Date(booking.endDate);
                    const duration = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    const engineer = getEngineer(booking.engineerId);
                    const isExpanded = expandedBooking === booking.id;

                    return React.createElement('div', {
                        key: booking.id,
                        className: 'border border-gray-200 rounded-lg overflow-hidden hover:shadow-md transition-shadow'
                    },
                        React.createElement('div', {
                            onClick: () => setExpandedBooking(isExpanded ? null : booking.id),
                            className: 'bg-gradient-to-r from-blue-50 to-indigo-50 p-4 cursor-pointer hover:from-blue-100 hover:to-indigo-100 transition-colors flex justify-between items-start'
                        },
                            React.createElement('div', { className: 'flex-1' },
                                React.createElement('div', { className: 'flex items-center gap-2 mb-2' },
                                    React.createElement('span', { className: 'font-bold text-lg text-gray-900' }, booking.jobName),
                                    React.createElement('span', { className: 'bg-indigo-600 text-white text-xs px-2 py-1 rounded font-medium' }, 
                                        `${duration} day${duration > 1 ? 's' : ''}`)
                                ),
                                React.createElement('div', { className: 'text-sm text-gray-700 space-y-1' },
                                    React.createElement('div', { className: 'flex items-center gap-2' },
                                        React.createElement(Users, { size: 16, className: 'text-indigo-600' }),
                                        React.createElement('span', { className: 'font-medium' }, engineer?.name),
                                        React.createElement('span', { className: 'text-xs bg-gray-200 px-2 py-0.5 rounded text-gray-700' }, engineer?.region)
                                    ),
                                    React.createElement('div', { className: 'flex items-center gap-2' },
                                        React.createElement(MapPin, { size: 16, className: 'text-indigo-600' }),
                                        React.createElement('span', null, booking.location),
                                        React.createElement('span', { className: 'text-xs bg-gray-200 px-2 py-0.5 rounded text-gray-700' }, booking.region)
                                    ),
                                    React.createElement('div', { className: 'flex items-center gap-2' },
                                        React.createElement(Calendar, { size: 16, className: 'text-indigo-600' }),
                                        React.createElement('span', null, `${start.toLocaleDateString()} → ${end.toLocaleDateString()}`)
                                    )
                                )
                            ),
                            React.createElement('button', {
                                onClick: (e) => {
                                    e.stopPropagation();
                                    handleDeleteBooking(booking.id);
                                },
                                className: 'ml-4 p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors'
                            }, React.createElement(X, { size: 20 }))
                        ),
                        isExpanded && React.createElement('div', {
                            className: 'bg-white border-t border-gray-200 p-6 space-y-6'
                        },
                            booking.jobDescription && React.createElement('div', null,
                                React.createElement('h4', { className: 'font-semibold text-gray-900 mb-2 flex items-center gap-2' },
                                    React.createElement(FileText, { size: 18, className: 'text-indigo-600' }),
                                    'Job Description'
                                ),
                                React.createElement('p', { className: 'text-gray-700 whitespace-pre-wrap bg-gray-50 p-4 rounded-lg border border-gray-200' }, 
                                    booking.jobDescription)
                            ),
                            booking.additionalDetails && React.createElement('div', null,
                                React.createElement('h4', { className: 'font-semibold text-gray-900 mb-2 flex items-center gap-2' },
                                    React.createElement(AlertCircle, { size: 18, className: 'text-indigo-600' }),
                                    'Additional Details'
                                ),
                                React.createElement('p', { className: 'text-gray-700 whitespace-pre-wrap bg-gray-50 p-4 rounded-lg border border-gray-200' },
                                    booking.additionalDetails)
                            ),
                            booking.documents && booking.documents.length > 0 && React.createElement('div', null,
                                React.createElement('h4', { className: 'font-semibold text-gray-900 mb-3 flex items-center gap-2' },
                                    React.createElement(Upload, { size: 18, className: 'text-indigo-600' }),
                                    `Documents (${booking.documents.length})`
                                ),
                                React.createElement('div', { className: 'space-y-2' },
                                    booking.documents.map(doc =>
                                        React.createElement('div', {
                                            key: doc.id,
                                            className: 'flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200 hover:bg-gray-100 transition-colors'
                                        },
                                            React.createElement('div', { className: 'flex items-center gap-3 flex-1 min-w-0' },
                                                React.createElement(FileText, { size: 18, className: 'text-indigo-600 flex-shrink-0' }),
                                                React.createElement('div', { className: 'min-w-0 flex-1' },
                                                    React.createElement('p', { className: 'text-sm font-medium text-gray-900 truncate' }, doc.name),
                                                    React.createElement('p', { className: 'text-xs text-gray-500' }, 
                                                        `${formatFileSize(doc.size)} • ${new Date(doc.uploadedAt).toLocaleDateString()}`)
                                                )
                                            ),
                                            React.createElement('button', {
                                                onClick: () => handleDownloadDocument(doc),
                                                className: 'ml-2 p-2 text-indigo-600 hover:bg-indigo-100 rounded-lg transition-colors flex-shrink-0'
                                            }, React.createElement(Download, { size: 18 }))
                                        )
                                    )
                                )
                            ),
                            !booking.jobDescription && !booking.additionalDetails && (!booking.documents || booking.documents.length === 0) && 
                                React.createElement('div', { className: 'text-center py-6 text-gray-500' },
                                    React.createElement('p', { className: 'text-sm' }, 'No additional details or documents for this booking')
                                )
                        )
                    );
                });
            };

            const monthName = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-50' },
                React.createElement('div', {
                    className: 'bg-white border-b border-gray-200 sticky top-0 z-50 backdrop-blur-sm bg-white/95'
                },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-4' },
                        React.createElement('div', { className: 'flex items-center justify-between' },
                            React.createElement('div', null,
                                React.createElement('h1', { className: 'text-3xl font-display font-bold text-gray-900' }, 'Team Resource Planner'),
                                React.createElement('p', { className: 'text-sm text-gray-500 mt-1' }, 'Engineering allocation, job tracking & documentation')
                            ),
                            React.createElement('div', { className: 'text-right' },
                                React.createElement('p', { className: 'text-sm text-gray-500' }, `Last sync: ${lastSync.toLocaleTimeString()}`),
                                React.createElement('p', { className: 'text-xs text-gray-400 mt-0.5' }, `${engineers.length} engineers • ${bookings.length} bookings`)
                            )
                        )
                    )
                ),
                React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-8' },
                    React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-4 gap-8' },
                        // Sidebar
                        React.createElement('div', { className: 'lg:col-span-1 space-y-6' },
                            // Engineers Panel
                            React.createElement('div', { className: 'bg-white rounded-xl border border-gray-200 p-6 shadow-sm' },
                                React.createElement('div', { className: 'flex items-center justify-between mb-4' },
                                    React.createElement('h2', { className: 'font-display font-bold text-lg text-gray-900' }, 'Engineers'),
                                    React.createElement('button', {
                                        onClick: () => setShowNewEngineer(!showNewEngineer),
                                        className: 'p-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors'
                                    }, React.createElement(Plus, { size: 18 }))
                                ),
                                showNewEngineer && React.createElement('div', { className: 'mb-4 p-4 bg-indigo-50 rounded-lg border border-indigo-200 space-y-3' },
                                    React.createElement('div', null,
                                        React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Name'),
                                        React.createElement('input', {
                                            type: 'text',
                                            value: newEngineer.name,
                                            onChange: (e) => setNewEngineer({ ...newEngineer, name: e.target.value }),
                                            placeholder: 'Engineer name',
                                            className: 'w-full px-3 py-2 border border-indigo-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500',
                                            autoFocus: true
                                        })
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Region'),
                                        React.createElement('input', {
                                            type: 'text',
                                            value: newEngineer.region,
                                            onChange: (e) => setNewEngineer({ ...newEngineer, region: e.target.value }),
                                            placeholder: 'e.g., North, South, London',
                                            className: 'w-full px-3 py-2 border border-indigo-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500'
                                        })
                                    ),
                                    React.createElement('div', { className: 'flex gap-2 pt-2' },
                                        React.createElement('button', {
                                            onClick: handleAddEngineer,
                                            className: 'flex-1 bg-indigo-600 text-white px-3 py-1 rounded text-sm font-medium hover:bg-indigo-700 transition-colors'
                                        }, 'Add'),
                                        React.createElement('button', {
                                            onClick: () => setShowNewEngineer(false),
                                            className: 'flex-1 bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm font-medium hover:bg-gray-300 transition-colors'
                                        }, 'Cancel')
                                    )
                                ),
                                React.createElement('div', { className: 'space-y-2' },
                                    engineers.length === 0 ?
                                        React.createElement('p', { className: 'text-sm text-gray-500 italic' }, 'No engineers yet') :
                                        engineers.map(engineer => {
                                            const engineerBookings = bookings.filter(b => b.engineerId === engineer.id);
                                            const activeBooking = engineerBookings.find(b => {
                                                const now = new Date();
                                                const start = new Date(b.startDate);
                                                const end = new Date(b.endDate);
                                                return now >= start && now <= end;
                                            });

                                            return React.createElement('div', {
                                                key: engineer.id,
                                                onClick: () => setSelectedEngineer(selectedEngineer === engineer.id ? null : engineer.id),
                                                className: `p-3 rounded-lg border cursor-pointer transition-all ${
                                                    selectedEngineer === engineer.id
                                                        ? 'bg-indigo-100 border-indigo-400'
                                                        : 'bg-gray-50 border-gray-200 hover:border-gray-300'
                                                }`
                                            },
                                                React.createElement('div', { className: 'flex items-start justify-between' },
                                                    React.createElement('div', { className: 'flex-1 min-w-0' },
                                                        React.createElement('p', { className: 'font-semibold text-sm text-gray-900' }, engineer.name),
                                                        React.createElement('p', { className: 'text-xs text-gray-500 font-medium' }, engineer.region),
                                                        activeBooking && React.createElement('p', { className: 'text-xs text-indigo-600 font-medium mt-1 line-clamp-1' }, `📍 ${activeBooking.location}`),
                                                        React.createElement('p', { className: 'text-xs text-gray-500 mt-1' }, `${engineerBookings.length} booking${engineerBookings.length !== 1 ? 's' : ''}`)
                                                    ),
                                                    React.createElement('button', {
                                                        onClick: (e) => {
                                                            e.stopPropagation();
                                                            handleDeleteEngineer(engineer.id);
                                                        },
